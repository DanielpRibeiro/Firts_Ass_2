<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #eef2f7;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Inter', Arial, sans-serif;
            padding: 24px;
        }

        .signature {
            display: flex;
            max-width: 850px;
            max-height: 295px;
            width: 100%;
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
        }

        .accent-bar {
            width: 5px;
            background: linear-gradient(180deg, #3b82f6 0%, #1d4ed8 100%);
            flex-shrink: 0;
        }

        .info-panel {
            padding: 22px 24px 20px 20px;
            width: 300px;
            min-width: 255px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        .name  { font-size: 18px; font-weight: 800; color: #0f172a; letter-spacing: -0.3px; line-height: 1.2; }
        .role  { font-size: 10px; font-weight: 700; color: #3b82f6; text-transform: uppercase; letter-spacing: 1.6px; margin-top: 4px; }
        .divider { height: 1px; background: linear-gradient(90deg, #e2e8f0 60%, transparent); margin: 14px 0; }
        .contacts { display: flex; flex-direction: column; gap: 8px; }

        .contact-item { display: flex; align-items: center; gap: 9px; font-size: 12px; color: #374151; }

        .icon-box {
            width: 24px; height: 24px; min-width: 24px;
            background: #eff6ff; border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
        }

        .contact-item a { color: #3b82f6; text-decoration: none; font-size: 11.5px; }
        .contact-item a:hover { text-decoration: underline; }

        /* ─── ÍCONES SOCIAIS — apenas ícone, sem texto ─── */
        .social-row { display: flex; gap: 8px; margin-top: 18px; }

        .social-icon-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: filter 0.2s, transform 0.15s;
        }
        .social-icon-btn:hover { filter: brightness(1.15); transform: translateY(-2px); }

        .btn-linkedin  { background: #0077B5; }
        .btn-instagram { background: linear-gradient(135deg, #833ab4 0%, #fd1d1d 55%, #fcb045 100%); }
        .btn-whatsapp  { background: #25D366; }

        .v-divider { width: 1px; background: #f1f5f9; flex-shrink: 0; }

        /* ─── PAINEL DIREITO ─────────────────────────── */
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 0 16px 16px 0;
        }

        /* ─── CARROSSEL ──────────────────────────────── */
        .carousel-zone {
            flex: 1;
            position: relative;
            overflow: hidden;
            min-height: auto;
        }

        .carousel-track {
            display: flex;
            height: 100%;
            transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
        }

        .carousel-slide {
            min-width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── LOGOS DO CARROSSEL: MAIORES ── */
        .carousel-slide img {
            max-width: 72%;
            max-height: 68%;
            width: auto;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.20));
        }

        .carousel-dots {
            position: absolute;
            bottom: 8px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 5px;
            z-index: 10;
        }
        .dot {
            height: 5px; width: 5px; border-radius: 99px;
            background:  #003876;
            cursor: pointer;
            transition: width 0.35s ease, background 0.35s ease;
        }
        .dot.active { width: 18px; background:#046ee7; }

        /* ─── SEPARADOR ──────────────────────────────── */
        .group-separator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 16px;
            background: #f8fafc;
            border-top: 1px solid #f1f5f9;
            height: 22px;
        }
        .sep-line { flex: 1; height: 1px; background: #e2e8f0; }
        .sep-label {
            font-size: 8px; font-weight: 700; color: #94a3b8;
            letter-spacing: 2px; text-transform: uppercase; white-space: nowrap;
        }

        /* ─── LOGOS MÃE — MAIORES ────────────────────── */
        .parent-logos-zone {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 10px 16px 13px;
            background: #f8fafc;
        }

        .parent-logo-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 80px;          /* aumentado de 36px → 48px */
            padding: 6px 14px;
            background: #ffffff;
            border-radius: 10px;
            border: 1px solid #e9edf2;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            transition: box-shadow 0.2s, transform 0.15s;
            flex: 1;               /* ocupa o espaço igualmente */
            max-width: 130px;
        }
        .parent-logo-wrap:hover {
            box-shadow: 0 4px 14px rgba(0,0,0,0.11);
            transform: translateY(-1px);
        }

        .parent-logo-wrap img {
            max-height: 56px;      /* aumentado de 26px → 36px */
            max-width: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            filter: grayscale(15%);
            opacity: 0.88;
            transition: opacity 0.2s, filter 0.2s;
        }
        .parent-logo-wrap:hover img { opacity: 1; filter: grayscale(0%); }
    </style>
</head>
<body>

        <!-- Carrossel das 4 marcas -->

                    <img src="https://github.com/DanielpRibeiro/Firts-Ass/blob/main/1%20(1).png" alt="Logo 1">

                <div class="dot active" onclick="goTo(0)"></div>

            </div>

</div>

<script>
    let current = 0;
    const total = 4;
    const track = document.getElementById('track');
    const dots  = document.querySelectorAll('.dot');

    // Clona o primeiro slide e adiciona ao final do track
    const firstSlide = track.querySelector('.carousel-slide');
    const clone = firstSlide.cloneNode(true);
    track.appendChild(clone);

    function updateDots(index) {
        dots.forEach((d, i) => d.classList.toggle('active', i === index % total));
    }

    function goTo(index) {
        current = index;
        track.style.transition = 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
        track.style.transform  = `translateX(-${current * 100}%)`;
        updateDots(current);
    }

    function next() {
        goTo(current + 1);

        // Se chegou no clone (posição 4), após a animação terminar:
        // reseta silenciosamente para a slide 1 real (posição 0)
        if (current === total) {
            setTimeout(() => {
                track.style.transition = 'none';       // desativa animação
                current = 0;
                track.style.transform  = 'translateX(0%)'; // pula para início
                updateDots(0);
            }, 520); // 20ms a mais que a transição (500ms) para não cortar
        }
    }

    // Auto-play
    setInterval(next, 3500);
</script>
